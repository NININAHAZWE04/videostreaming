# ?? Sťcuritť admin ? CHANGEZ cette valeur en production ! ????
admin.secret=changeme-admin-secret

# ?? JWT ? CHANGEZ cette valeur en production ! ???????????????
jwt.secret=changeme-jwt-secret-64chars-minimum-length-please-change-me

# ?? Plans & tarifs ???????????????????????????????????????????
