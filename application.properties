db.user=sa
db.password=

# Console web H2 (dťsactiver en production)
h2.console.enabled=true
h2.console.port=18082

# ?? Streaming ????????????????????????????????????????????????
# Connexions simultanťes max par adresse IP
streaming.max.connections.per.ip=5
# Connexions simultanťes max globales (API /api/media)
streaming.max.concurrent.clients=150

# Dossier de vidťos par dťfaut (utilisť par le script setup)
videos.directory=./videos

# ?? Logs ?????????????????????????????????????????????????????
